syntax = "proto3";
package garf;
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";


service GarfService {
  rpc Execute(ExecuteRequest) returns (ExecuteResponse) {}
  rpc ExecuteBatch(ExecuteBatchRequest) returns (ExecuteBatchResponse) {}
  rpc ExecuteWorkflow(ExecuteWorkflowRequest) returns (ExecuteWorkflowResponse) {}
  rpc Fetch(FetchRequest) returns (FetchResponse) {}
  rpc GetVersion(google.protobuf.Empty) returns (GarfVersion) {}
  rpc GetInfo(google.protobuf.Empty) returns (GarfInfo) {}
  rpc ListFetchers(google.protobuf.Empty) returns (ListFetchersResponse) {}
  rpc ListExecutors(google.protobuf.Empty) returns (ListExecutorsResponse) {}
}

message FetchRequest {
  string source = 1;
  string title = 2;
  string query = 3;
  FetchContext context = 4;
  GarfCacheOptions cache_options = 5;
  bool simulate = 6;
}

message FetchResponse {
  repeated string columns = 1;
  repeated google.protobuf.Struct rows = 2;
}

message FetchContext {
  QueryParameters query_parameters = 1;
  google.protobuf.Struct fetcher_parameters = 2;
}


message GarfCacheOptions {
  bool enable_cache = 1;
  uint32 cache_ttl_seconds = 2;
}

message ExecuteRequest {
  string source = 1;
  string title = 2;
  string query = 3;
  ExecutionContext context = 4;
  GarfCacheOptions cache_options = 5;
  bool simulate = 6;

}



message ExecutionContext {
  QueryParameters query_parameters = 1;
  google.protobuf.Struct fetcher_parameters = 2;
  string writer = 3;
  google.protobuf.Struct writer_parameters = 4;
  repeated string writers = 5;
}


message QueryParameters {
  google.protobuf.Struct macro = 1;
  google.protobuf.Struct template = 2;
  bool macro_expansion = 3;
}

message ExecuteResponse {
  repeated string results = 1;
}

// Batch Execution
message QueryDefinition {
  string title = 1;
  string text = 2;
}

message ExecuteBatchRequest {
  string source = 1;
  repeated QueryDefinition batch = 2;
  ExecutionContext context = 3;
  GarfCacheOptions cache_options = 4;
  bool simulate = 5;
}

message ExecuteBatchResponse {
  repeated string results = 1;
}

// Workflow
message FetcherInfo {
  string name = 1;
  string version = 2;
}

message WorkflowMetadata {
  string version = 1;
  string description = 2;
  string required_garf_version = 3;
  repeated FetcherInfo required_fetchers = 4;
}

message WorkflowStep {
  string fetcher = 1;
  string alias = 2;
  repeated QueryDefinition queries = 3;
  QueryParameters query_parameters = 4;
  google.protobuf.Struct fetcher_parameters = 5;
  string writer = 6;
  google.protobuf.Struct writer_parameters = 7;
  uint32 parallel_threshold = 8;
}

message ConfigMetadata {
  string version = 1;
  string description = 2;
}

message Config {
  string name = 1;
  ConfigMetadata metadata = 2;
  ExecutionContext global_parameters = 3;
  google.protobuf.Struct sources = 4;
}

message Workflow {
  string name = 1;
  repeated WorkflowStep steps = 2;
  WorkflowMetadata metadata = 3;
  string prefix = 4;
}

message ExecuteWorkflowRequest {
  Workflow workflow = 1;
  repeated string selected_aliases = 2;
  repeated string skipped_aliases = 3;
  Config config = 4;
  ExecutionContext context = 5;
  GarfCacheOptions cache_options = 6;
  bool simulate = 7;
}

message ExecuteWorkflowResponse {
  repeated string results = 1;
}


// List
message ListFetchersResponse {
  repeated FetcherInfo results = 1;
}

message ListExecutorsResponse {
  repeated string results = 1;
}

// Info
message GarfVersion {
  string version = 1;
}

message GarfInfo {
  string executors_version = 1;
  string core_version = 2;
  string io_version = 3;
}
