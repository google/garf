run:
  for:
    value: pair
    in: ${pairs}
    steps:
      - log_source:
          call: sys.log
          args:
            data: ${pair.fetcher}
      - execute_queries:
          parallel:
            for:
              value: query
              in: ${pair.queries}
              steps:
                - log_query:
                    call: sys.log
                    args:
                      data: ${pair}
                - check_writer:
                    switch:
                      - condition: ${"writer" in pair}
                        next: execute_api_query
                    next: execute_postprocessing_query
                - execute_postprocessing_query:
                    try:
                      call: http.post
                      args:
                        url: ${sys.get_env("GARF_ENDPOINT") + "/api/execute"}
                        auth:
                          type: OIDC
                        body:
                          source: ${pair.fetcher}
                          title: ${query.title}
                          query: ${query.text}
                          context:
                            fetcher_parameters: ${pair.fetcher_parameters}
                            query_parameters:
                              macro: ${pair.query_parameters.macro}
                              template: ${pair.query_parameters.template}
                      result: task_resp
                    except:
                      as: e
                      steps:
                      - log_error_postproc:
                          call: sys.log
                          args:
                            data:
                              error: ${e}
                              query: ${query.title}
                              source: ${pair.fetcher}
                            severity: ERROR
                      - fail_postproc:
                          raise: ${e}
                    next: log_result
                - execute_api_query:
                    try:
                      call: http.post
                      args:
                        url: ${sys.get_env("GARF_ENDPOINT") + "/api/execute"}
                        auth:
                          type: OIDC
                        body:
                          source: ${pair.fetcher}
                          title: ${query.title}
                          query: ${query.text}
                          context:
                            fetcher_parameters: ${pair.fetcher_parameters}
                            writer: ${pair.writer}
                            writer_parameters: ${pair.writer_parameters}
                            query_parameters:
                              macro: ${pair.query_parameters.macro}
                              template: ${pair.query_parameters.template}
                      result: task_resp
                    except:
                      as: e
                      steps:
                      - log_error_api:
                          call: sys.log
                          args:
                            data:
                              error: ${e}
                              query: ${query.title}
                              source: ${pair.fetcher}
                            severity: ERROR
                      - fail_api:
                          raise: ${e}
                - log_result:
                    call: sys.log
                    args:
                      data: ${task_resp}
